channels:
  - conda-forge
  - bioconda
  - pytorch
  - nvidia
  - defaults

dependencies:

  # Python scientific stack
  - python=3.11
  - flask
  - biopython
  - pip
  - numpy
  - pandas
  - scipy
  - matplotlib
  - h5py

  # Bio / file formats
  - pysam

  # YAML + CLI
  - pyyaml

  # PyTorch (CPU by default; see CUDA note below)
  - pytorch
  - torchvision
  - torchaudio

  # Multiprocessing / utilities
  - regex

  # R + rpy2 bridge
  - r-base=4.3
  - rpy2

  # R packages you listed
  - r-glue
  - r-ape
  - r-nlme
  - r-optparse
  - r-tictoc
  - r-ggrepel
  - r-ggplot2
  - r-dplyr
  - r-phytools
  - bioconductor-complexheatmap
  - r-circlize
  - r-stringr
  - bioconductor-rhdf5


  # If you ever use RERconverge (commented in your R script):
  # - r-devtools
  # - r-remotes

  # Pip-only (if any of these aren’t available via conda on your system)
  - pip:
      - typer
